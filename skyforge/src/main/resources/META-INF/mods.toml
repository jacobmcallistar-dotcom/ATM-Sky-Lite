modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
${mod_description}
'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Soft deps: SkyForge loads without them, but adds recipe hooks when present.
[[dependencies.${mod_id}]]
    modId="mekanism"
    mandatory=false
    versionRange="*"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="ae2"
    mandatory=false
    versionRange="*"
    ordering="AFTER"
    side="BOTH"

# Mystical Agriculture: we supply Resource Crops for the Ad Astra ores via an MA plugin.
# MA calls the plugin during its own registration window, so no ordering is strictly required;
# declared soft so the relationship is visible and load order stays deterministic.
[[dependencies.${mod_id}]]
    modId="mysticalagriculture"
    mandatory=false
    versionRange="*"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="ad_astra"
    mandatory=false
    versionRange="*"
    ordering="AFTER"
    side="BOTH"
